<!doctype html>
<html lang="en" data-theme="german">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="German Super League Cricket – State-wise leagues, teams, matches, and playoffs across all German states." />
    <meta name="theme-color" content="#000000" />
    <!-- Classic theme fonts: Barlow Condensed + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
    <title>GSLC – German Super League Cricket</title>
    <script>
      // Apply stored theme before first paint — prevents flash
      try {
        var t = localStorage.getItem('gslc-theme');
        document.documentElement.setAttribute('data-theme', (t === 'classic' || t === 'german') ? t : 'german');
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
