<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA fallback for GitHub Pages
      // Redirects all 404s back to index.html preserving the path
      const path = window.location.pathname.replace('/gslcricket', '') || '/';
      const search = window.location.search;
      const hash = window.location.hash;
      window.location.replace(
        '/gslcricket/?redirect=' + encodeURIComponent(path + search + hash)
      );
    </script>
  </head>
  <body></body>
</html>
